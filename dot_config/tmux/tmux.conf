############################################################
# tmux.conf
# Phase 1 (2026-04-22): Ghostty + tmux 並列開発環境の土台
# - prefix は Ctrl+a （zsh の Ctrl+g=fzf-ghq と衝突しないため）
# - Phase 2 で worktree 連携 (prefix + o/W/P/w/Q 等) を追加予定
############################################################

# -------------------- ターミナル / 色 --------------------
# tmux-256color をベースにし、Ghostty を含め truecolor を有効化
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Ghostty のハイパーリンク・OSC 通過を許可（画像プレビューや URL 連携で使う）
set -as terminal-features ",xterm-ghostty:hyperlinks"
set -g allow-passthrough on

# システムクリップボードへの書き込みを許可
set -s set-clipboard on

# CSI u 拡張キー（Ctrl+Tab, Shift+Enter など modifier 付きキー）を有効化
set -s extended-keys on

# フォーカスイベントを通知（Neovim の autoread 等で利用）
set -g focus-events on

# Esc 連打のもたつき解消（Neovim 推奨）
set -sg escape-time 0

# 履歴バッファを大きめに
set -g history-limit 50000

# -------------------- インデックス / リネーム --------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# -------------------- prefix --------------------
unbind C-b
set -g prefix C-a
# prefix を2連打で実際の C-a を送る
bind C-a send-prefix

# -------------------- マウス / コピーモード --------------------
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

setw -g mode-keys vi
# prefix + [ でコピーモード（tmux デフォルト準拠）
bind [ copy-mode
# prefix + ESC / Ctrl-C でプレフィックスをキャンセル
bind Escape display-message "cancelled"
bind C-c   display-message "cancelled"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# -------------------- ペイン分割 / 移動 --------------------
# 既存互換: | と - でも分割できるようにしつつカレントディレクトリを引き継ぐ
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
# h (横分割) / v (縦分割)
bind h split-window -h -c '#{pane_current_path}'
bind v split-window -v -c '#{pane_current_path}'

# ペイン移動
# 小文字 h/k は分割に転用したため、大文字 H/J/K/L と矢印キーで移動する
# Ghostty の Cmd+Shift+h/j/k/l → prefix + H/J/K/L に対応
bind H select-pane -L
bind J select-pane -D
bind K select-pane -U
bind L select-pane -R
bind j select-pane -D
bind l select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# -------------------- ウィンドウ移動（prefix なし） --------------------
# Ghostty が ctrl+tab → \e[9;5u、ctrl+shift+tab → \e[9;6u を送る
# extended-keys on により tmux が C-Tab / C-S-Tab として認識する
bind -n C-Tab   next-window
bind -n C-S-Tab previous-window

# -------------------- Neovim 連携（vim-tmux-navigator） --------------------
# Neovim が動いているペインでは Neovim 側の Ctrl+h/j/k/l を優先し、
# それ以外のペインでは tmux のペイン移動として動作する。
# これにより Neovim 内外でシームレスにペイン移動できる。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# -------------------- 便利バインド --------------------
# 設定の再読み込み
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ドキュメントをfzfで選択して表示（Ghostty+tmux / worktree / Neovim）
bind ? display-popup -E -w 85% -h 90% "zsh ~/.local/bin/tm-docs"

# 現在 window のブランチに紐づく PR をブラウザで開く
bind b run-shell 'zsh -c "cd #{q:pane_current_path} && gh pr view --web 2>&1" || tmux display-message -d 3000 "No PR found for current branch"'

# スクロールバック内の URL を fzf でリスト表示してブラウザで開く
bind u display-popup -E -d "#{pane_current_path}" -w 80% -h 50% "zsh ~/.local/bin/tm-url"

# カレントペインのディレクトリで VS Code を開く
# worktree 内なら .code-workspace を生成して開く（拡張機能が正しく機能するようにするため）
bind e run-shell 'zsh ~/.local/bin/tm-code #{q:pane_current_path}'

# 外部エディタでプロンプトを入力して Claude Code に反映
bind-key C-g display-popup -E -w 80% -h 80% "zsh -ic 'EDITOR=nvim VISUAL=nvim claude-prompt-edit #{pane_id}'"

# -------------------- ステータスバー --------------------
set-option -g status-position top
# status-left-length はセッション切替フックで動的に更新する（初期値は十分大きく）
set-option -g status-left-length 60
set-option -g status-left '#[fg=colour252,bold] #S  '

# セッション切替・作成・名前変更時に status-left-length を動的に更新
set-hook -ga client-session-changed 'run-shell "zsh ~/.local/bin/tm-status-length"'
set-hook -ga session-created        'run-shell "zsh ~/.local/bin/tm-status-length"'
set-hook -ga session-renamed        'run-shell "zsh ~/.local/bin/tm-status-length"'
set-option -g status-right ''
set-option -g status-bg "colour234"
set-option -g status-fg "colour246"
set -g status-right "#[fg=colour246,bg=colour234] - #[fg=colour252,bg=colour232]"

# ステータスバーの更新間隔（秒）: Claude Code 状態アイコンのリフレッシュ周期
set -g status-interval 2

# Window 内の Claude Code 状態を ⚡/❓/✅ アイコンで表示する
# /tmp/claude-status/<pane_id> を参照して最も優先度の高い状態を表示する
set-window-option -g window-status-current-style fg=colour252,bg=colour232
set-window-option -g window-status-current-format "  #[fg=colour238]#I:#[default] #W#(bash ~/.local/bin/tm-claude-icon '#{session_name}' #{window_index})  "
set-window-option -g window-status-format "  #[fg=colour236]#I:#[default] #[fg=colour240]#W#(bash ~/.local/bin/tm-claude-icon '#{session_name}' #{window_index})#[default]  "

# ステータスバーのマウス操作（既存互換）
bind-key -n DoubleClick1StatusDefault new-window
bind-key -n DoubleClick1Status kill-window
bind-key -n MouseDown1StatusRight detach-client

# pane 終了時に対応する Claude ステータスファイルを自動削除
# これにより死んだ pane のゴーストファイルが蓄積するのを防ぐ
set-hook -ga pane-exited "run-shell 'rm -f /tmp/claude-status/#{pane_id} 2>/dev/null'"

# 設定リロード時に、存在しない pane の孤立ステータスファイルを一括削除
set-hook -g after-source-file "run-shell 'for f in /tmp/claude-status/%*; do id=\"\$(basename \$f)\"; tmux list-panes -a -F \"#{pane_id}\" 2>/dev/null | grep -qxF \"\$id\" || rm -f \"\$f\"; done'"

# -------------------- ポップアップ既定サイズ（Phase 2 で使用） --------------------
# display-popup のデフォルトサイズを決め打ちで揃える
# Phase 2 の prefix + o/W/P/w/Q 等はこのサイズ感で表示する予定

# -------------------- Phase 2: worktree / セッション操作 --------------------
# zsh -l は ~/.zprofile の curl 呼び出しでブロックするため plain zsh を使う
# PATH はスクリプト側で明示設定済み
# display-popup は read 入力が不安定なため、new-window で通常 window として起動する
# スクリプト終了時に window は自動で閉じる（remain-on-exit off がデフォルト）
bind o new-window -n "wt:new"    -c "#{pane_current_path}" "zsh ~/.local/bin/tm-wt --new;    tmux last-window 2>/dev/null"
bind W new-window -n "wt:select" -c "#{pane_current_path}" "zsh ~/.local/bin/tm-wt;           tmux last-window 2>/dev/null"
bind w new-window -n "wt:switch" -c "#{pane_current_path}" "zsh ~/.local/bin/tm-wt --switch;  tmux last-window 2>/dev/null"
# prefix + p のデフォルト (previous-window) を解除して PR worktree 作成に割り当て
unbind p
bind p new-window -n "wt:pr"     -c "#{pane_current_path}" "zsh ~/.local/bin/tm-pr;           tmux last-window 2>/dev/null"
bind P new-window -n "wt:pr"     -c "#{pane_current_path}" "zsh ~/.local/bin/tm-pr;           tmux last-window 2>/dev/null"
# fzf の矢印キー操作のために display-popup を使用
bind q display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "zsh ~/.local/bin/tm-wt --delete"
bind Q display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "zsh ~/.local/bin/tm-wt --delete"
bind n new-window -n "session:new"  -c "#{pane_current_path}" "zsh ~/.local/bin/tm-new-session;   tmux last-window 2>/dev/null"
bind k new-window -n "session:kill" -c "#{pane_current_path}" "zsh ~/.local/bin/tm-kill-session;  tmux last-window 2>/dev/null"
bind g new-window -n "wt:ghq"       -c "#{pane_current_path}" "zsh ~/.local/bin/tm-ghq;           tmux last-window 2>/dev/null"
bind s display-popup -E -w 90% -h 90% -S "fg=colour252,bg=colour232" "zsh ~/.local/bin/tm"
bind m switch-client -l
